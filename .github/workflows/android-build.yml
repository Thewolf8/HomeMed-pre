name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build web app
      run: npm run build
    
    # 1. حل مشكلة اختفاء المنصة واستخدام الاسم الكامل لـ CLI
    - name: Install Capacitor Android and Sync
      run: |
        npm install @capacitor/android
        npx @capacitor/cli add android || true
        npx @capacitor/cli sync android

    # 2. خطوة توليد الأيقونات تلقائياً من المسار assets/icon.png
    - name: Generate App Icons from Assets
      run: |
        npm install @capacitor/assets
        npx @capacitor/assets generate --android
    
    # 3. ترقية إصدار الجافا إلى 21 لمنع خطأ الـ Compiler
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    # 4. حل تضارب ملفات كوتلن المتكررة (Kotlin Duplicate Classes)
    - name: Fix Kotlin Duplicate Classes Conflict
      run: |
        echo "" >> android/app/build.gradle
        echo "configurations.all {" >> android/app/build.gradle
        echo "    resolutionStrategy {" >> android/app/build.gradle
        echo "        force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'" >> android/app/build.gradle
        echo "        force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'" >> android/app/build.gradle
        echo "        force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'" >> android/app/build.gradle
        echo "    }" >> android/app/build.gradle
        echo "}" >> android/app/build.gradle

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew
    
    - name: Build Android APK (Debug)
      run: cd android && ./gradlew assembleDebug

    - name: Build Android APK (Release)
      run: cd android && ./gradlew assembleRelease

    # 5. تنظيف وتنظيم الملفات لتظهر مباشرة عند فك الضغط وبدون مجلدات معقدة
    - name: Prepare Clean Output Directory
      run: |
        mkdir -p output-files
        cp android/app/build/outputs/apk/debug/app-debug.apk output-files/app-debug.apk
        cp android/app/build/outputs/apk/release/app-release-unsigned.apk output-files/app-release.apk
    
    # رفع نسخة الـ Debug بشكل نظيف ومباشر
    - name: Upload Debug APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: output-files/app-debug.apk
        retention-days: 30
    
    # رفع نسخة الـ Release بشكل نظيف ومباشر
    - name: Upload Release APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: output-files/app-release.apk
        retention-days: 30
